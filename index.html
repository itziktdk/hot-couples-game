<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔥 הזוגות החמים 🔥</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;direction:rtl}
.screen{display:none;min-height:100vh;padding:20px;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:fadeIn .5s}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes fire{0%,100%{text-shadow:0 0 10px #ff4500,0 0 20px #ff4500,0 0 40px #ff0000}50%{text-shadow:0 0 20px #ff6a00,0 0 40px #ff6a00,0 0 60px #ff4500}}
@keyframes confetti{0%{transform:translateY(-100vh) rotate(0)}100%{transform:translateY(100vh) rotate(720deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
h1{font-size:2.5em;font-weight:900;animation:fire 2s infinite;margin-bottom:10px}
h2{font-size:1.8em;font-weight:700;color:#ff6a00;margin-bottom:15px}
.btn{background:linear-gradient(135deg,#ff4500,#ff6a00);color:#fff;border:none;padding:16px 40px;font-size:1.3em;font-weight:700;border-radius:50px;cursor:pointer;font-family:'Heebo';transition:all .3s;box-shadow:0 4px 20px rgba(255,69,0,.4);margin:8px}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(255,69,0,.6)}
.btn:active{transform:scale(.97)}
.btn.secondary{background:linear-gradient(135deg,#333,#555)}
.btn.vote-btn{padding:14px 20px;font-size:1.1em;width:100%;max-width:350px;margin:6px auto;display:block;animation:slideUp .4s backwards}
.btn.selected{background:linear-gradient(135deg,#ff1744,#ff6a00);box-shadow:0 0 25px rgba(255,23,68,.6)}
.card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #ff450055;border-radius:20px;padding:30px;margin:15px 0;width:100%;max-width:450px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.question-card{font-size:1.5em;line-height:1.6;min-height:120px;display:flex;align-items:center;justify-content:center;animation:bounceIn .5s}
.category-badge{display:inline-block;padding:8px 20px;border-radius:30px;font-size:.9em;font-weight:700;margin-bottom:15px;animation:slideUp .3s}
.cat-truth{background:linear-gradient(135deg,#e91e63,#c2185b)}
.cat-who{background:linear-gradient(135deg,#ff6a00,#ff4500)}
.cat-vs{background:linear-gradient(135deg,#9c27b0,#7b1fa2)}
.cat-reveal{background:linear-gradient(135deg,#f44336,#b71c1c)}
input[type=text]{background:#1a1a2e;border:2px solid #ff450055;color:#fff;padding:14px 20px;font-size:1.1em;border-radius:15px;font-family:'Heebo';width:100%;max-width:350px;text-align:center;margin:6px 0;transition:border-color .3s}
input[type=text]:focus{outline:none;border-color:#ff6a00}
.couple-input{display:flex;align-items:center;gap:8px;margin:6px 0;animation:slideUp .3s backwards}
.couple-input span{font-size:1.3em}
.scoreboard{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:15px 0;width:100%;max-width:500px}
.score-item{background:#1a1a2e;border:1px solid #ff450033;border-radius:15px;padding:10px 18px;min-width:120px;transition:all .3s}
.score-item .name{font-weight:700;color:#ff6a00;font-size:1.1em}
.score-item .pts{font-size:1.5em;font-weight:900;color:#fff}
.progress-bar{width:100%;max-width:400px;height:8px;background:#1a1a2e;border-radius:10px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff4500,#ff6a00);border-radius:10px;transition:width .5s}
.round-info{font-size:.9em;color:#888;margin-bottom:5px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:30px 0}
.podium-place{text-align:center;border-radius:15px 15px 0 0;padding:15px 10px;min-width:90px;animation:slideUp .6s backwards}
.podium-place.first{background:linear-gradient(180deg,#ffd700,#ff8c00);height:200px;order:2}
.podium-place.second{background:linear-gradient(180deg,#c0c0c0,#808080);height:150px;order:1}
.podium-place.third{background:linear-gradient(180deg,#cd7f32,#8b4513);height:110px;order:3}
.podium-place .medal{font-size:2.5em}
.podium-place .pname{font-weight:900;font-size:1.1em;margin:5px 0}
.podium-place .pscore{font-size:1.3em;font-weight:700}
.emoji-rain{position:fixed;top:-50px;font-size:2em;animation:confetti 3s linear forwards;pointer-events:none;z-index:999}
.age-warning{font-size:1em;color:#ff6a00;margin:15px 0;line-height:1.5}
.vs-label{font-size:1.3em;color:#ff6a00;font-weight:900;margin:10px 0}
.timer-bar{width:100%;max-width:400px;height:6px;background:#1a1a2e;border-radius:10px;margin:10px 0;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#ff4500,#ffd700);border-radius:10px;transition:width 1s linear}
.subtitle{color:#aaa;font-size:1em;margin-bottom:20px}
</style>
</head>
<body>

<!-- AGE GATE -->
<div class="screen active" id="ageGate">
<h1>🔥 הזוגות החמים 🔥</h1>
<p class="subtitle">משחק השאלות הכי חם למסיבת זוגות</p>
<div class="card">
<p class="age-warning">⚠️ המשחק מכיל תוכן למבוגרים בלבד 🌶️<br>שאלות חושניות, אינטימיות ומאוד מפוקפקות!<br><br>האם כולם מעל גיל 18?</p>
</div>
<button class="btn" onclick="showScreen('setup')">🔞 כן, כולנו מבוגרים! יאללה!</button>
</div>

<!-- SETUP -->
<div class="screen" id="setup">
<h1>🔥 הזוגות החמים 🔥</h1>
<h2>הכניסו את הזוגות</h2>
<div id="coupleInputs"></div>
<div style="margin-top:10px">
<button class="btn secondary" id="addCoupleBtn" onclick="addCouple()">➕ הוסיפו זוג</button>
</div>
<div style="margin-top:15px">
<button class="btn" onclick="startGame()">🔥 יאללה, מתחילים!</button>
</div>
<p style="color:#666;font-size:.85em;margin-top:10px">2-5 זוגות</p>
</div>

<!-- GAME -->
<div class="screen" id="game">
<div class="round-info" id="roundInfo"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="scoreboard" id="scoreboard"></div>
<div id="categoryBadge"></div>
<div class="card question-card" id="questionCard"></div>
<div id="vsArea"></div>
<div id="voteArea" style="margin-top:15px;width:100%;max-width:400px"></div>
<div id="gameActions" style="margin-top:15px"></div>
</div>

<!-- RESULTS -->
<div class="screen" id="results">
<h1>🏆 התוצאות 🏆</h1>
<h2 id="winnerTitle"></h2>
<div class="podium" id="podium"></div>
<div id="fullScores" style="margin-top:20px"></div>
<button class="btn" onclick="location.reload()" style="margin-top:20px">🔄 משחק חדש</button>
</div>

<script>
const Q={
miZug:[
"מי מהזוג יותר שולט/ת במיטה? 😈",
"מי מהזוג יזם/ה יותר סקס?",
"מי מהזוג יותר רועש/ה במיטה? 🔊",
"מי מהזוג יותר אוהב/ת לנסות דברים חדשים במיטה?",
"מי מהזוג שלח/ה יותר תמונות חמות? 📸",
"מי מהזוג יותר מתוח/ה כשלא עושים את זה הרבה זמן?",
"מי מהזוג יותר פנטזיונר/ית?",
"מי מהזוג יותר טוב/ה בנשיקות? 💋",
"מי מהזוג נגמר/ת ראשון/ה?",
"מי מהזוג יותר אוהב/ת פורפליי?",
"מי מהזוג יותר קינקי? ⛓️",
"מי מהזוג מעדיף/ה את זה בבוקר?",
"מי מהזוג יותר מפנק/ת?",
"מי מהזוג הכי מהר מתרגש/ת?",
"מי מהזוג יותר אוהב/ת סקס טלפוני? 📱",
"מי מהזוג יותר יצירתי/ת בתנוחות? 🤸",
"מי מהזוג יותר מקנא/ה?",
],
emet:[
"מה הפנטזיה הכי מטורפת שלכם שעוד לא הגשמתם? 🌙",
"מתי הפעם האחרונה שעשיתם משהו במקום ציבורי? 👀",
"מה הדבר הכי מביך שקרה לכם במיטה?",
"מה הסקסט הכי חם ששלחתם אחד לשני? 📱",
"באיזה מקום הכי מוזר עשיתם את זה?",
"מה הדבר שבן/בת הזוג עושה שהכי מדליק אתכם?",
"האם אי פעם חשבתם על מישהו אחר בזמן סקס? 🤫",
"מה הפנטזיה שאתם מתביישים לספר?",
"מה הדבר הכי פרוע שעשיתם יחד?",
"כמה פעמים בשבוע אתם עושים את זה? אמת! 🔢",
"מה הצעצוע האהוב עליכם? 😏",
"האם אי פעם צילמתם את עצמכם? 🎥",
"מה הדבר שהייתם רוצים שבן/בת הזוג יעשה יותר במיטה?",
"מתי הפעם האחרונה שהפתעתם אחד את השני בסקס?",
"מה הדבר הכי מושך בבן/בת הזוג שלכם פיזית?",
"אם הייתם יכולים לשנות דבר אחד בחיי המין שלכם, מה זה היה?",
"ספרו על הפעם הכי ארוכה שלכם 🕐",
"מה הדבר שלמדתם אחד על השני רק אחרי שהתחלתם לגור ביחד?",
"מה הסוד הכי עסיסי שלכם שאף אחד לא יודע?",
"האם ניסיתם פעם לשחק תפקידים? ספרו! 🎭",
],
zugNegedZug:[
"מה המקום הכי מטורף שעשיתם בו את זה? 🏖️",
"תארו את הלילה הכי חם שהיה לכם ב-30 שניות ⏱️",
"מה הפנטזיה שהגשמתם ואיך זה היה?",
"מה הדבר הכי רומנטי שעשיתם לפני הסקס?",
"איך נראה הסקסט האחרון שלכם? קראו בקול! 📖",
"מה הטריק הכי טוב שלכם לפתיינות? 😘",
"ספרו על הפעם הכי מביכה שכמעט נתפסתם 🚪",
"מה עושים כשאחד רוצה והשני לא?",
"תארו את הלילה הראשון שלכם ביחד 💫",
"מה הדבר הכי יצירתי שעשיתם במיטה?",
"מה הקוד הסודי שלכם כשאתם רוצים את זה? 😉",
"איזה שיר הכי מדליק אתכם ביחד? 🎵",
"מה הדבר הכי מפתיע שגיליתם שמדליק אתכם?",
"ספרו על ניסיון כושל שהפך למצחיק 😂",
"מה הפנטזיה הבאה שאתם רוצים להגשים?",
],
hashifa:[
"מה הדבר שאתם מסתירים מההורים שלכם לגבי היחסים? 🙈",
"האם אי פעם חשבתם לנסות שלישייה? 👀",
"מה הדבר הכי שנוי במחלוקת ביניכם בנושא סקס?",
"ספרו על משהו שראיתם בפורנו ורציתם לנסות 🎬",
"מה הסוד הכי גדול שלכם שבן/בת הזוג לא יודע/ת?",
"האם אי פעם שיקרתם לגבי כמה פרטנרים היו לכם? 🤥",
"מה הדבר הכי מוזר שמדליק אתכם ואתם מתביישים בזה?",
"האם אי פעם קינאתם בחיי המין של זוג אחר?",
"מה הגבול שאתם לא מוכנים לחצות במיטה? 🚫",
"ספרו על פעם שהתחרטתם על משהו שעשיתם ביחד",
"מה הדבר הכי אינטימי שעשיתם שזה לא סקס?",
"האם יש משהו שניסיתם פעם אחת ואמרתם 'אף פעם יותר'? 😬",
"מה הדבר שהכי מפחיד אתכם לנסות ובכל זאת רוצים?",
"האם אי פעם דיברתם על חוקים ל'משחקים' עם אנשים אחרים?",
"מה הדבר שלמדתם על עצמכם מינית רק בזכות בן/בת הזוג?",
"ספרו על הפעם שבן/בת הזוג הכי הפתיע/ה אתכם 😲",
"מה הייתם משנים בפעם הראשונה שלכם ביחד?",
]
};

const catInfo={
miZug:{name:"מי מהזוג... 🤔",cls:"cat-who"},
emet:{name:"אמת 🔥",cls:"cat-truth"},
zugNegedZug:{name:"זוג נגד זוג ⚔️",cls:"cat-vs"},
hashifa:{name:"חשיפה 💣",cls:"cat-reveal"},
};

let couples=[],scores={},currentQ=0,questions=[],votedFor=null;

function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// Setup
function initSetup(){
const c=document.getElementById('coupleInputs');
c.innerHTML='';
for(let i=0;i<2;i++) addCouple();
}
function addCouple(){
const c=document.getElementById('coupleInputs');
const n=c.children.length;
if(n>=5)return;
const d=document.createElement('div');
d.className='couple-input';
d.style.animationDelay=n*0.1+'s';
d.innerHTML=`<span>💑</span><input type="text" placeholder="שם זוג ${n+1} (למשל: דני ומיכל)" class="couple-name">`;
c.appendChild(d);
if(c.children.length>=5)document.getElementById('addCoupleBtn').style.display='none';
}
initSetup();

function startGame(){
couples=[];
document.querySelectorAll('.couple-name').forEach(inp=>{
const v=inp.value.trim();
if(v)couples.push(v);
});
if(couples.length<2){alert('צריך לפחות 2 זוגות!');return;}
scores={};
couples.forEach(c=>scores[c]=0);
buildQuestions();
currentQ=0;
showScreen('game');
showQuestion();
}

function buildQuestions(){
questions=[];
const cats=Object.keys(Q);
const all=[];
cats.forEach(cat=>{
Q[cat].forEach(q=>all.push({cat,q}));
});
// shuffle
for(let i=all.length-1;i>0;i--){const j=Math.random()*i|0;[all[i],all[j]]=[all[j],all[i]];}
// pick ~15-20 rounds
questions=all.slice(0,Math.min(20,all.length));
// for vs questions, assign two couples
questions.forEach(q=>{
if(q.cat==='zugNegedZug'){
const shuffled=[...couples].sort(()=>Math.random()-.5);
q.couple1=shuffled[0];
q.couple2=shuffled[1%shuffled.length];
}
});
}

function showQuestion(){
if(currentQ>=questions.length){showResults();return;}
const q=questions[currentQ];
const info=catInfo[q.cat];
votedFor=null;

document.getElementById('roundInfo').textContent=`שאלה ${currentQ+1} מתוך ${questions.length}`;
document.getElementById('progressFill').style.width=((currentQ+1)/questions.length*100)+'%';

// scoreboard
const sb=document.getElementById('scoreboard');
sb.innerHTML='';
couples.forEach(c=>{
sb.innerHTML+=`<div class="score-item"><div class="name">${c}</div><div class="pts">${scores[c]} ⭐</div></div>`;
});

// category
const cb=document.getElementById('categoryBadge');
cb.innerHTML=`<span class="category-badge ${info.cls}">${info.name}</span>`;

// question
document.getElementById('questionCard').textContent=q.q;

// vs area
const vs=document.getElementById('vsArea');
if(q.cat==='zugNegedZug'){
vs.innerHTML=`<div class="vs-label">${q.couple1} ⚔️ ${q.couple2}</div>`;
}else{vs.innerHTML='';}

// vote area
const va=document.getElementById('voteArea');
va.innerHTML='';
if(q.cat==='zugNegedZug'){
[q.couple1,q.couple2].forEach((c,i)=>{
const b=document.createElement('button');
b.className='btn vote-btn';
b.style.animationDelay=i*0.1+'s';
b.textContent=`🗳️ ${c}`;
b.onclick=()=>selectVote(c,b);
va.appendChild(b);
});
}else{
couples.forEach((c,i)=>{
const b=document.createElement('button');
b.className='btn vote-btn';
b.style.animationDelay=i*0.1+'s';
b.textContent=`🗳️ ${c}`;
b.onclick=()=>selectVote(c,b);
va.appendChild(b);
});
}

// actions
document.getElementById('gameActions').innerHTML=`<button class="btn" onclick="confirmVote()">✅ אישור והמשך</button><br><button class="btn secondary" style="font-size:.9em;margin-top:5px" onclick="skipQuestion()">⏭️ דלג</button>`;
}

function selectVote(couple,btn){
votedFor=couple;
document.querySelectorAll('.vote-btn').forEach(b=>b.classList.remove('selected'));
btn.classList.add('selected');
}

function confirmVote(){
if(votedFor){
scores[votedFor]=(scores[votedFor]||0)+1;
spawnEmoji('⭐');
}
currentQ++;
showQuestion();
}

function skipQuestion(){currentQ++;showQuestion();}

function showResults(){
showScreen('results');
const sorted=couples.sort((a,b)=>scores[b]-scores[a]);
document.getElementById('winnerTitle').textContent=`🔥 ${sorted[0]} הם הזוג הכי חם! 🔥`;

const podium=document.getElementById('podium');
podium.innerHTML='';
const medals=['🥇','🥈','🥉'];
const classes=['first','second','third'];
for(let i=0;i<Math.min(3,sorted.length);i++){
const d=document.createElement('div');
d.className=`podium-place ${classes[i]}`;
d.style.animationDelay=(.2+i*.2)+'s';
d.innerHTML=`<div class="medal">${medals[i]}</div><div class="pname">${sorted[i]}</div><div class="pscore">${scores[sorted[i]]} ⭐</div>`;
podium.appendChild(d);
}

const fs=document.getElementById('fullScores');
if(sorted.length>3){
fs.innerHTML='<h2>כל התוצאות</h2>'+sorted.slice(3).map((c,i)=>
`<div class="score-item" style="margin:5px;display:inline-block"><div class="name">${c}</div><div class="pts">${scores[c]} ⭐</div></div>`
).join('');
}

// celebration
for(let i=0;i<20;i++) setTimeout(()=>spawnEmoji(['🔥','❤️','🌶️','💋','🏆','⭐','🎉'][Math.random()*7|0]),i*150);
}

function spawnEmoji(e){
const s=document.createElement('div');
s.className='emoji-rain';
s.textContent=e;
s.style.left=Math.random()*100+'vw';
s.style.animationDuration=(2+Math.random()*2)+'s';
document.body.appendChild(s);
setTimeout(()=>s.remove(),4000);
}
</script>
</body>
</html>
