<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔥 הזוגות החמים 🔥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;direction:rtl}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.screen.active{display:flex}
h1{font-size:2.2em;margin-bottom:10px;text-shadow:0 0 20px #ff4500}
h2{font-size:1.5em;color:#ff8c00;margin-bottom:20px}
.subtitle{font-size:1.2em;color:#ff8c00;margin-bottom:30px}
.btn{background:linear-gradient(135deg,#ff4500,#ff8c00);border:none;color:#fff;padding:16px 40px;font-size:1.3em;border-radius:50px;cursor:pointer;margin:10px;transition:all .3s;font-family:inherit;min-width:200px}
.btn:hover,.btn:active{transform:scale(1.05);box-shadow:0 0 30px rgba(255,69,0,.6)}
.btn:disabled{opacity:.4;transform:none}
.btn-small{padding:10px 24px;font-size:1em;min-width:auto}
.btn-danger{background:linear-gradient(135deg,#666,#444)}
input{background:rgba(255,255,255,.1);border:2px solid #ff4500;color:#fff;padding:14px 20px;font-size:1.1em;border-radius:15px;width:100%;max-width:300px;text-align:center;margin:6px 0;font-family:inherit}
input::placeholder{color:rgba(255,255,255,.4)}
.couple-entry{background:rgba(255,69,0,.1);border:1px solid rgba(255,69,0,.3);border-radius:20px;padding:15px;margin:10px 0;width:100%;max-width:350px}
.couple-entry label{color:#ff8c00;font-size:.9em}
.option-btn{background:rgba(255,69,0,.15);border:2px solid rgba(255,69,0,.4);color:#fff;padding:16px 20px;font-size:1.15em;border-radius:15px;cursor:pointer;margin:8px 0;width:100%;max-width:400px;transition:all .3s;font-family:inherit;text-align:center}
.option-btn:hover,.option-btn:active{background:rgba(255,69,0,.4);border-color:#ff4500;transform:scale(1.03)}
.option-btn.selected{background:rgba(255,69,0,.6);border-color:#ff8c00;box-shadow:0 0 15px rgba(255,69,0,.4)}
.progress-bar{width:100%;max-width:400px;height:8px;background:rgba(255,255,255,.1);border-radius:10px;margin:15px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff4500,#ff8c00);border-radius:10px;transition:width .5s}
.question-text{font-size:1.4em;margin:20px 0;line-height:1.6;max-width:400px}
.turn-label{font-size:1.6em;margin:15px 0;color:#ff8c00;animation:pulse 1.5s infinite}
.pass-screen{font-size:1.8em;line-height:1.8}
.reveal-icon{font-size:4em;margin:20px 0;animation:bounceIn .6s}
.score-display{font-size:1.2em;margin:10px 0;color:#ff8c00}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:15px;margin:30px 0}
.podium-item{display:flex;flex-direction:column;align-items:center;padding:15px;border-radius:15px 15px 0 0;min-width:90px}
.podium-item.first{background:linear-gradient(180deg,#ffd700,#b8860b);height:180px;order:2}
.podium-item.second{background:linear-gradient(180deg,#c0c0c0,#808080);height:140px;order:1}
.podium-item.third{background:linear-gradient(180deg,#cd7f32,#8b4513);height:110px;order:3}
.podium-name{font-size:1em;font-weight:bold;margin-top:auto}
.podium-score{font-size:.9em;opacity:.9}
.podium-medal{font-size:2em}
.confetti{position:fixed;top:-10px;font-size:1.5em;animation:fall linear forwards;pointer-events:none;z-index:999}
@keyframes fall{to{top:110vh;transform:rotate(720deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.fade-in{animation:slideUp .5s ease}
.round-info{font-size:.95em;color:#aaa;margin:10px 0}
.emoji-big{font-size:3em;margin:10px 0}
.reveal-answers{display:flex;gap:15px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.reveal-card{background:rgba(255,255,255,.1);border-radius:15px;padding:15px 20px;min-width:140px}
.reveal-card .label{font-size:.85em;color:#ff8c00;margin-bottom:5px}
.reveal-card .answer{font-size:1.1em}
.couples-list{width:100%;max-width:380px}

/* Timer styles */
.timer-container{margin:15px 0}
.timer-circle{width:90px;height:90px;border-radius:50%;border:5px solid #ff8c00;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:border-color .3s}
.timer-circle.warning{border-color:#ff8c00;animation:timerPulse .5s infinite}
.timer-circle.danger{border-color:#ff0000;animation:timerPulse .3s infinite}
.timer-number{font-size:2.5em;font-weight:bold}
.timer-label{font-size:.85em;color:#aaa;margin-top:5px}
.timeout-msg{font-size:1.8em;margin:20px 0;animation:bounceIn .5s}
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="screen-age">
<div class="emoji-big">🔥</div>
<h1>הזוגות החמים</h1>
<p class="subtitle">כמה אתם באמת מכירים אחד את השני? 😏</p>
<br>
<button class="btn" onclick="confirmAge()">בואו נתחיל! 🔥</button>
</div>

<!-- SETUP -->
<div class="screen" id="screen-setup">
<h2>הכניסו את הזוגות 💑</h2>
<p style="color:#aaa;margin-bottom:15px">2-5 זוגות</p>
<div class="couples-list" id="couplesList"></div>
<div style="margin:15px 0">
<button class="btn btn-small" onclick="addCouple()" id="addBtn">+ הוסיפו זוג</button>
</div>
<button class="btn" onclick="startGame()" id="startBtn" disabled>יאללה, מתחילים! 🔥</button>
</div>

<!-- TURN ANNOUNCE -->
<div class="screen" id="screen-turn">
<div class="emoji-big" id="turnEmoji">💑</div>
<h2 id="turnTitle"></h2>
<p class="turn-label" id="turnLabel"></p>
<p style="color:#aaa" id="turnHint"></p>
<br>
<button class="btn" onclick="showQuestion()">מוכן/ה! 👀</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<p class="round-info" id="roundInfo"></p>
<div class="timer-container">
<div class="timer-circle" id="timerCircle"><span class="timer-number" id="timerNumber">20</span></div>
<p class="timer-label">שניות ⏱️</p>
</div>
<p class="question-text" id="questionText"></p>
<div id="optionsContainer"></div>
</div>

<!-- PASS PHONE -->
<div class="screen" id="screen-pass">
<div class="emoji-big">📱</div>
<p class="pass-screen" id="passText"></p>
<br>
<button class="btn" onclick="startPartnerB()">קיבלתי את הטלפון! 😎</button>
</div>

<!-- TIMEOUT -->
<div class="screen" id="screen-timeout">
<div class="timeout-msg">⏰ נגמר הזמן!</div>
<h2 id="timeoutWho"></h2>
<p style="font-size:1.2em;color:#aaa;margin:10px 0">לא הספקת... נחשב כטעות! 😅</p>
<br>
<button class="btn" id="timeoutBtn" onclick="handleTimeout()">הלאה! ➡️</button>
</div>

<!-- REVEAL -->
<div class="screen" id="screen-reveal">
<div class="reveal-icon" id="revealIcon"></div>
<h2 id="revealTitle"></h2>
<p id="revealMsg" style="font-size:1.2em;margin:10px 0"></p>
<div class="reveal-answers" id="revealAnswers"></div>
<p class="score-display" id="revealScore"></p>
<br>
<button class="btn" onclick="nextRound()">הלאה! ➡️</button>
</div>

<!-- RESULTS -->
<div class="screen" id="screen-results">
<h1>🏆 התוצאות! 🏆</h1>
<p class="subtitle">הזוג שמכיר הכי טוב...</p>
<div class="podium" id="podium"></div>
<div id="allScores" style="margin:20px 0"></div>
<br>
<button class="btn" onclick="location.reload()">משחק חדש 🔄</button>
</div>

<script>
const questions=[
{q:"מי מהזוג יותר עקשן/ית?",o:["אני 💪","בן/בת הזוג 😤","שנינו 🤼","אף אחד מאיתנו 😇"]},
{q:"מה בן/בת הזוג שלך יבחר לארוחת ערב?",o:["פיצה 🍕","סושי 🍣","המבורגר 🍔","סלט בריא 🥗"]},
{q:"מה הדבר הראשון שבן/בת הזוג עושה בבוקר?",o:["בודק טלפון 📱","שותה קפה ☕","מתלונן 😫","מחבק אותי 🤗"]},
{q:"לאן הייתם טסים ביחד?",o:["פריז 🗼","ניו יורק 🗽","תאילנד 🏝️","להישאר בבית 🏠"]},
{q:"מי מהזוג יותר חסכן/ית?",o:["אני 💰","בן/בת הזוג 🏦","שנינו בזבזנים 🛍️","שנינו חסכנים 🐿️"]},
{q:"מי מהזוג תמיד צודק/ת (לפי עצמו)?",o:["אני, כמובן 😎","בן/בת הזוג 🧠","שנינו חושבים שאנחנו 😂","אף אחד, אנחנו מסכימים 🕊️"]},
{q:"מי מהזוג שולט בשלט של הטלוויזיה?",o:["אני! 📺","בן/בת הזוג 🎮","נלחמים על זה כל ערב 🤼","לא רואים טלוויזיה 📵"]},
{q:"מה בן/בת הזוג שלך עושה כשכועס/ת?",o:["שותק/ת 🤐","צועק/ת 🗣️","הולך/ת לחדר אחר 🚪","אוכל/ת 🍫"]},
{q:"מה יקרה אם תיתקעו ביחד בפקק שעתיים?",o:["נשיר ביחד 🎤","נריב 😤","נאכל חטיפים 🍿","נשתגע 🤯"]},
{q:"מי מהזוג יותר רגיש/ה?",o:["אני 🥺","בן/בת הזוג 😢","שנינו רגישים 💕","אף אחד, אנחנו קשוחים 💪"]},
{q:"מה בן/בת הזוג היה/תה בחיים קודמים?",o:["מלך/מלכה 👑","חתול 🐱","שף מפורסם 👨‍🍳","לוחם/ת סמוראי ⚔️"]},
{q:"מי מהזוג מבשל/ת יותר טוב?",o:["אני, ברור! 👨‍🍳","בן/בת הזוג 🍳","שנינו גרועים 😅","מזמינים משלוח 📦"]},
{q:"מה הדבר שהכי מעצבן אותך בבן/בת הזוג?",o:["משאיר/ה בלאגן 🧦","תמיד על הטלפון 📱","מאחר/ת תמיד ⏰","לא מקשיב/ה 🙉"]},
{q:"מי מהזוג יותר חברותי/ת?",o:["אני, בפער 🎉","בן/בת הזוג 🤝","שנינו חברותיים 🥳","שנינו ביתיים 🏠"]},
{q:"כמה זמן לוקח לבן/בת הזוג להתארגן לצאת?",o:["5 דקות ⚡","חצי שעה ⏱️","שעה לפחות 😤","אנחנו עדיין מחכים 💀"]},
{q:"מה בן/בת הזוג לא יכול/ה בלי?",o:["קפה ☕","טלפון 📱","אותי! 😍","שינה 😴"]},
{q:"מי נרדם/ת ראשון/ה?",o:["אני 😴","בן/בת הזוג 💤","ביחד 🤗","אף אחד, שנינו על הטלפון 📱"]},
{q:"מה הייתם עושים עם מיליון שקל?",o:["טיול מסביב לעולם ✈️","קונים בית 🏡","משקיעים 📈","שופינג מטורף 🛍️"]},
{q:"מי מהזוג יותר עצלן/ית בסופ\"ש?",o:["אני 🛋️","בן/בת הזוג 😴","שנינו 🦥","אף אחד, אנחנו פעילים 🏃"]},
{q:"מה הריב הכי מצחיק שהיה לכם?",o:["על מה לאכול 🍔","על לאן לנסוע 🗺️","על מי שכח משהו 🤦","על הניקיון 🧹"]},
{q:"איזה חיית מחמד בן/בת הזוג היה/תה רוצה?",o:["כלב 🐕","חתול 🐈","דג 🐟","אין, מספיק ילדים 😂"]},
{q:"מי מהזוג שר/ה יותר טוב (לדעת עצמו)?",o:["אני 🎤","בן/בת הזוג 🎵","שנינו נוראיים 🙉","שנינו מדהימים 🌟"]},
{q:"מי מהזוג יותר פחדן/ית?",o:["אני 😱","בן/בת הזוג 🫣","שנינו גיבורים 🦸","שנינו פחדנים 🐔"]},
{q:"מה בן/בת הזוג עושה כשמשעמם לו/לה?",o:["גולל/ת בטלפון 📱","אוכל/ת 🍿","ישן/ה 😴","מציק/ה לי 😜"]},
{q:"מי מהזוג יותר רומנטי/ת?",o:["אני 🌹","בן/בת הזוג 💕","שנינו סופר רומנטיים 💑","רומנטיקה? מה זה? 🤷"]},
{q:"מה הייתם עושים ביום חופשי ביחד?",o:["נטפליקס ושמיכה 🎬","טיול בטבע 🌲","קניון 🛒","ישנים כל היום 😴"]},
{q:"מי מהזוג יותר טוב בניווט?",o:["אני 🧭","בן/בת הזוג 🗺️","שנינו הולכים לאיבוד 😂","וויז עושה הכל 📍"]},
{q:"מה הדבר הכי מצחיק שבן/בת הזוג עשה/תה?",o:["נפל/ה מול אנשים 😂","אמר/ה משהו מביך 🤭","שכח/ה משהו חשוב 🤦","התבלבל/ה באנשים 😅"]},
{q:"מי מהזוג שותה יותר קפה?",o:["אני ☕☕","בן/בת הזוג ☕","שנינו מכורים ☕☕☕","לא שותים קפה 🫖"]},
{q:"מה בן/בת הזוג לובש/ת בבית?",o:["פיג'מה 🩳","תחתונים וגופייה 😎","בגדי ספורט 🏋️","מה שיש 🤷"]},
{q:"מי מהזוג יותר אופטימי/ת?",o:["אני ☀️","בן/בת הזוג 🌈","שנינו 😊","אף אחד מאיתנו 🌧️"]},
{q:"מה תגובת בן/בת הזוג כשאתה קונה משהו יקר?",o:["שמח/ה בשבילי 😊","כועס/ת 😤","שואל/ת למה 🤨","קונה גם לעצמו/ה 🛍️"]},
{q:"מי מהזוג זוכר תאריכים חשובים?",o:["אני 📅","בן/בת הזוג 💝","שנינו שוכחים 🤦","גוגל מזכיר לנו 📱"]},
{q:"מה בן/בת הזוג אומר/ת הכי הרבה?",o:["'אני עייף/ה' 😫","'מה יש לאכול?' 🍽️","'בוא/י נצא' 🚗","'אני אוהב/ת אותך' ❤️"]},
{q:"מי מהזוג יותר מסודר/ת?",o:["אני ✨","בן/בת הזוג 🧹","שנינו מסודרים 🏠","שנינו בלאגניסטים 🌪️"]},
{q:"מה בן/בת הזוג הכי אוהב/ת לעשות בחופש?",o:["לטייל ✈️","לישון 😴","לבלות עם חברים 🍻","לא לעשות כלום 🧘"]},
{q:"מי מהזוג יותר דרמטי/ת?",o:["אני 🎭","בן/בת הזוג 😱","שנינו 🎪","אף אחד, אנחנו רגועים 😌"]},
{q:"מה עושים כשיש מריבה?",o:["מדברים עד שפותרים 🗣️","הולכים לישון עצבניים 😤","אחד מתנצל ראשון 🫂","אוכלים ביחד ונשכח 🍕"]},
{q:"מי מהזוג הכי אוהב/ת לצלם תמונות?",o:["אני 📸","בן/בת הזוג 🤳","שנינו 📷","אנחנו שונאים תמונות 🙈"]},
{q:"מה הייתם עושים אם בן/בת הזוג שוכח/ת יום נישואין?",o:["דרמה גדולה 😤","מזכיר/ה ברמז 😏","לא אכפת לי 🤷","שוכח/ת בעצמי 😅"]},
{q:"מי מהזוג יותר אוהב/ת מסיבות?",o:["אני 🎉","בן/בת הזוג 🥳","שנינו 🪩","שנינו מעדיפים בית 🏠"]},
{q:"מה בן/בת הזוג מזמין/ה תמיד במסעדה?",o:["המבורגר 🍔","פסטה 🍝","סטייק 🥩","שואל/ת מה אני לוקח 😂"]},
{q:"מי מהזוג שולח/ת יותר הודעות?",o:["אני 💬","בן/בת הזוג 📱","שווה שווה ⚖️","שנינו מתקשרים 📞"]},
{q:"מה הייתם עושים אם הייתם מחליפים גוף ליום?",o:["בודק/ת איך זה להיות השני 🔄","ישן/ה כל היום 😴","יוצא/ת עם החברים שלו/ה 👋","עושה שטויות 🤪"]},
{q:"מי מהזוג יותר חם/ה בחורף?",o:["אני, תנור אנושי 🔥","בן/בת הזוג 🧣","שנינו קופאים 🥶","לא קר בארץ 🌞"]},
{q:"מה בן/בת הזוג לא יודע/ת שאתה יודע/ת?",o:["ההיסטוריה בדפדפן 🔍","הסודות שלו/ה 🤫","כלום, אנחנו פתוחים 💕","הרבה דברים 😈"]},
{q:"מי מהזוג יותר מצחיק/ה?",o:["אני 😂","בן/בת הזוג 🤣","שנינו קורעים 💀","אנחנו רציניים 🧐"]},
{q:"מה בן/בת הזוג עושה שמדליק אותך?",o:["מבשל/ת 🍳","מחייך/ת 😊","מתלבש/ת יפה 👔","מספר/ת בדיחות 😆"]},
{q:"מי מהזוג דואג/ת יותר?",o:["אני 🤗","בן/בת הזוג 💝","שנינו 🫂","אנחנו רגועים 😎"]},
{q:"מה הזוג שלכם יעשה במקרה של זומבי אפוקליפסה?",o:["נילחם ביחד! ⚔️","נסתתר בבית 🏠","נברח לאי בודד 🏝️","נריב על מי אשם 😂"]},
{q:"מי מהזוג אוהב/ת יותר לישון?",o:["אני 😴","בן/בת הזוג 💤","שנינו 🛏️","אף אחד, אנחנו אנרגטיים ⚡"]},

{q:"מה ההרגל הכי מוזר של בן/בת הזוג?",o:["מדבר/ת עם עצמו/ה 🗣️","אוכל/ת דברים מוזרים 🤔","ישן/ה בתנוחות מוזרות 😴","אוסף/ת דברים מיותרים 📦"]},
{q:"מי מהזוג יותר סבלני/ת בתור?",o:["אני 😌","בן/בת הזוג 🧘","שנינו חסרי סבלנות 😤","תלוי באורך התור 🤷"]},
{q:"מה הייתם עושים אם יורד גשם בדיוק באירוע שלכם?",o:["רוקדים בגשם! 🌧️💃","בוכים 😭","ממשיכים בפנים 🏠","זה סימן טוב! ☔✨"]},
{q:"מי מהזוג יותר מפחד מרופא שיניים?",o:["אני 😱","בן/בת הזוג 🦷","שנינו 😰","אנחנו גיבורים 💪"]},
];

let couples=[],scores={},currentRound=0,totalRounds=0,roundOrder=[];
let currentCouple,personAAnswer,phase;
let timerInterval=null,timerSeconds=0;

function confirmAge(){show('screen-setup');addCouple();addCouple()}

function addCouple(){
if(document.querySelectorAll('.couple-entry').length>=5)return;
const n=document.querySelectorAll('.couple-entry').length+1;
const d=document.createElement('div');d.className='couple-entry fade-in';
d.innerHTML=`<label>זוג ${n}</label><input placeholder="שם בן/בת זוג א׳" class="nameA"><input placeholder="שם בן/בת זוג ב׳" class="nameB">`;
document.getElementById('couplesList').appendChild(d);
d.querySelectorAll('input').forEach(i=>i.addEventListener('input',checkReady));
if(n>=5)document.getElementById('addBtn').style.display='none';
checkReady();
}

function checkReady(){
const entries=document.querySelectorAll('.couple-entry');
let valid=0;
entries.forEach(e=>{
const a=e.querySelector('.nameA').value.trim(),b=e.querySelector('.nameB').value.trim();
if(a&&b)valid++;
});
document.getElementById('startBtn').disabled=valid<2;
}

function startGame(){
couples=[];
document.querySelectorAll('.couple-entry').forEach(e=>{
const a=e.querySelector('.nameA').value.trim(),b=e.querySelector('.nameB').value.trim();
if(a&&b)couples.push({a,b,score:0});
});
if(couples.length<2)return;
for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]]}
const perCouple=25;
totalRounds=perCouple*couples.length;
roundOrder=[];
for(let r=0;r<perCouple;r++)couples.forEach((_,i)=>roundOrder.push(i));
currentRound=0;
nextRound();
}

function stopTimer(){
if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
}

function startTimer(){
stopTimer();
timerSeconds=20;
updateTimerDisplay();
const circle=document.getElementById('timerCircle');
circle.className='timer-circle';
timerInterval=setInterval(()=>{
timerSeconds--;
updateTimerDisplay();
if(timerSeconds<=5){circle.className='timer-circle danger';}
else if(timerSeconds<=10){circle.className='timer-circle warning';}
if(timerSeconds<=0){
stopTimer();
onTimeout();
}
},1000);
}

function updateTimerDisplay(){
document.getElementById('timerNumber').textContent=timerSeconds;
}

function onTimeout(){
document.querySelectorAll('.option-btn').forEach(b=>b.onclick=null);
if(phase==='A'){
document.getElementById('timeoutWho').textContent=`${currentCouple.a} לא הספיק/ה! 😅`;
document.getElementById('timeoutBtn').onclick=()=>{
personAAnswer=-1;
document.getElementById('passText').innerHTML=`תעביר/י את הטלפון ל<br><span style="color:#ff8c00;font-size:1.2em">${currentCouple.b}</span>! 📱`;
show('screen-pass');
};
}else{
document.getElementById('timeoutWho').textContent=`${currentCouple.b} לא הספיק/ה! 😅`;
document.getElementById('timeoutBtn').onclick=()=>{
reveal(-1);
};
}
show('screen-timeout');
}

function nextRound(){
if(currentRound>=totalRounds){showResults();return}
const ci=roundOrder[currentRound];
currentCouple=couples[ci];
phase='A';
document.getElementById('turnTitle').textContent=`${currentCouple.a} ❤️ ${currentCouple.b}`;
document.getElementById('turnLabel').textContent=`תור של ${currentCouple.a}!`;
document.getElementById('turnHint').textContent='תענה/י ותעביר/י את הטלפון';
document.getElementById('turnEmoji').textContent='💑';
show('screen-turn');
}

function showQuestion(){
const q=questions[currentRound%questions.length];
document.getElementById('questionText').textContent=q.q;
document.getElementById('roundInfo').textContent=`שאלה ${currentRound+1} מתוך ${totalRounds}`;
document.getElementById('progressFill').style.width=((currentRound+1)/totalRounds*100)+'%';
const c=document.getElementById('optionsContainer');c.innerHTML='';
q.o.forEach((opt,i)=>{
const b=document.createElement('button');b.className='option-btn fade-in';b.textContent=opt;
b.style.animationDelay=(i*0.1)+'s';
b.onclick=()=>pickAnswer(i,b);
c.appendChild(b);
});
show('screen-question');
startTimer();
}

function pickAnswer(idx,btn){
stopTimer();
document.querySelectorAll('.option-btn').forEach(b=>b.onclick=null);
btn.classList.add('selected');
if(phase==='A'){
personAAnswer=idx;
setTimeout(()=>{
document.getElementById('passText').innerHTML=`תעביר/י את הטלפון ל<br><span style="color:#ff8c00;font-size:1.2em">${currentCouple.b}</span>! 📱`;
show('screen-pass');
},600);
}else{
setTimeout(()=>reveal(idx),600);
}
}

function startPartnerB(){
phase='B';
document.getElementById('turnLabel').textContent=`תור של ${currentCouple.b}!`;
document.getElementById('turnHint').textContent=`מה לדעתך ${currentCouple.a} ענה/תה?`;
document.getElementById('turnEmoji').textContent='🤔';
show('screen-turn');
}

function reveal(bAnswer){
const q=questions[currentRound%questions.length];
const match=personAAnswer>=0 && bAnswer>=0 && personAAnswer===bAnswer;
if(match)currentCouple.score++;
document.getElementById('revealIcon').textContent=match?'🎉':'😂';
document.getElementById('revealTitle').textContent=match?'התאמה מושלמת! 🔥':'לא הכרתם! 😜';
const msgs=match?
['אתם פשוט חיה אחת! 🔥','טלפתיה! 🧠','בול! אתם שורפים! 🔥','מכירים אחד את השני בעיניים עצומות 😏']:
['אולי תדברו יותר 😂','צריך לתרגל 😅','בפעם הבאה תשימו לב! 🫣','חחחח לא קלעתם 🤣'];
document.getElementById('revealMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
const aText=personAAnswer>=0?q.o[personAAnswer]:'⏰ לא הספיק/ה!';
const bText=bAnswer>=0?q.o[bAnswer]:'⏰ לא הספיק/ה!';
document.getElementById('revealAnswers').innerHTML=`
<div class="reveal-card fade-in"><div class="label">${currentCouple.a} ענה/תה:</div><div class="answer">${aText}</div></div>
<div class="reveal-card fade-in"><div class="label">${currentCouple.b} ניחש/ה:</div><div class="answer">${bText}</div></div>`;
document.getElementById('revealScore').textContent=`${currentCouple.a} ❤️ ${currentCouple.b}: ${currentCouple.score} נקודות`;
show('screen-reveal');
if(match)spawnConfetti();
currentRound++;
}

function showResults(){
const sorted=[...couples].sort((a,b)=>b.score-a.score);
const medals=['🥇','🥈','🥉'];
const classes=['first','second','third'];
const p=document.getElementById('podium');p.innerHTML='';
sorted.slice(0,3).forEach((c,i)=>{
const d=document.createElement('div');d.className=`podium-item ${classes[i]} fade-in`;
d.innerHTML=`<div class="podium-medal">${medals[i]}</div><div class="podium-name">${c.a} ❤️ ${c.b}</div><div class="podium-score">${c.score} נקודות</div>`;
p.appendChild(d);
});
const all=document.getElementById('allScores');all.innerHTML='<br>';
sorted.forEach((c,i)=>{
all.innerHTML+=`<p style="font-size:1.1em;margin:5px">${medals[i]||'🔹'} ${c.a} & ${c.b} — ${c.score} נק׳</p>`;
});
show('screen-results');
spawnConfetti();
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function spawnConfetti(){
const emojis=['🔥','❤️','✨','💕','🎉','🥳','💥','⭐'];
for(let i=0;i<30;i++){
const c=document.createElement('div');c.className='confetti';c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
c.style.left=Math.random()*100+'vw';c.style.animationDuration=(2+Math.random()*2)+'s';c.style.animationDelay=(Math.random()*1)+'s';
document.body.appendChild(c);setTimeout(()=>c.remove(),5000);
}
}
</script>
</body>
</html>
